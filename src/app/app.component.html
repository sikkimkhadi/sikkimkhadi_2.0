<!-- Conditional rendering based on screen size -->
@if (showShell | async) {
  @if (showNavbar | async) {
  <!-- Desktop navigation bar -->
  <app-navbar />
  } @else {
  <!-- Mobile navigation bar -->
  <app-mobilenav />
  }
}

<!-- Main content container -->
<main class="container">
  <!-- Dynamic content based on routing -->
  <router-outlet />
</main>

<!-- Footer component -->
@if (showShell | async) {
  <app-footer />
}
